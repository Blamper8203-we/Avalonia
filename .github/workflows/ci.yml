name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Avalonia.sln

      - name: Build
        run: dotnet build Avalonia.sln -c Release --no-restore

      - name: Test
        run: dotnet test Tests/Avalonia.Tests.csproj -c Release --no-build --verbosity normal
