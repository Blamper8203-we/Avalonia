<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: transparent; }
      .wire { fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #000000; }
      .text-bold { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #000000; }
    </style>
  </defs>

  <!-- Tło -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Górna linia (podłączenie z szyny fazowej) -->
  <line x1="150" y1="60" x2="150" y2="130" class="wire" />
  
  <!-- Węzeł stały (punkt podłączenia u góry) -->
  <circle cx="150" cy="60" r="3" class="node" />

  <!-- BLOK SPD (Ogranicznik przepięć) -->
  <rect x="130" y="130" width="40" height="60" class="wire" />
  
  <!-- Symbol iskiernika wewnątrz bloku (dwie strzałki skierowane do siebie) -->
  <!-- Strzałka górna (w dół) -->
  <line x1="150" y1="130" x2="150" y2="155" class="wire" />
  <polyline points="143,148 150,155 157,148" class="wire" />
  
  <!-- Strzałka dolna (w górę) -->
  <line x1="150" y1="190" x2="150" y2="165" class="wire" />
  <polyline points="143,172 150,165 157,172" class="wire" />

  <!-- Dolna linia (odprowadzenie do uziemienia) -->
  <line x1="150" y1="190" x2="150" y2="250" class="wire" />
  
  <!-- SYMBOL UZIEMIENIA (PE) -->
  <!-- Trzy poziome linie o zmniejszającej się szerokości -->
  <line x1="125" y1="250" x2="175" y2="250" class="wire" />
  <line x1="135" y1="260" x2="165" y2="260" class="wire" />
  <line x1="145" y1="270" x2="155" y2="270" class="wire" />

</svg>