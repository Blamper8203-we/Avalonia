<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: transparent; }
      .wire { fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #000000; }
      .text-bold { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #000000; }
    </style>
  </defs>

  <!-- Tło -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Górna linia (podłączenie z szyny fazowej) -->
  <line x1="150" y1="60" x2="150" y2="130" class="wire" />
  
  <!-- Węzeł stały (punkt podłączenia u góry) -->
  <circle cx="150" cy="60" r="3" class="node" />

  <text x="155" y="128" class="text-bold" style="font-size: 7px;">L1 L2 L3</text>


  <!-- BLOK KONTROLEK FAZ -->
  <rect x="130" y="130" width="40" height="60" class="wire" />

  <!-- Symbol lampki L2 (środek) -->
  <circle cx="150" cy="160" r="8" class="wire" />
  <line x1="144" y1="154" x2="156" y2="166" class="wire" />
  <line x1="144" y1="166" x2="156" y2="154" class="wire" />

  <!-- Dolna linia (odprowadzenie do listwy neutralnej N) -->
  <line x1="150" y1="190" x2="150" y2="250" class="wire" />
  
  <!-- Zacisk i oznaczenie przewodu neutralnego -->
  <circle cx="150" cy="250" r="3" class="node" />

  <text x="160" y="255" class="text-bold" style="font-size: 16px;">N</text>

</svg>